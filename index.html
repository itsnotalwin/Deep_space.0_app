      for (let i=0;i<shootingStars.length;i++) {
        let s=shootingStars[i]; s.x+=s.vx; s.y+=s.vy;
        if(s.x+s.length<0||s.x-s.length>w||s.y+s.length<0||s.y-s.length>h) shootingStars.splice(i--,1);
      }
      if (--nextShootingStar<=0) {
        let angle = Math.random()*Math.PI*2, speed = 5+Math.random()*8, len = 50+Math.random()*70, op = 0.4+Math.random()*0.5;
        let edge = Math.floor(Math.random()*4), x,y;
        if (edge===0) { x=-len*0.5; y=Math.random()*h; }
        else if (edge===2) { x=w+len*0.5; y=Math.random()*h; }
        else if (edge===1) { x=Math.random()*w; y=-len*0.5; }
        else { x=Math.random()*w; y=h+len*0.5; }
        spawnShootingStar(angle, speed, len, op, x, y);
        nextShootingStar = Math.floor(150+Math.random()*400);
      }
      if (Math.random()<0.0003 && !showerActive) triggerMeteorShower();
    }
    function drawShootingStars() {
      for (let s of shootingStars) {
        let headX=s.x, headY=s.y, dir=Math.hypot(s.vx,s.vy); if(dir<0.01) continue;
        let tailX=s.x-s.vx*(s.length/dir), tailY=s.y-s.vy*(s.length/dir);
        let grad=ctx.createLinearGradient(headX,headY,tailX,tailY);
        grad.addColorStop(0,`rgba(255,240,200,${s.opacity})`); grad.addColorStop(1,`rgba(160,100,70,0)`);
        ctx.beginPath(); ctx.moveTo(headX,headY); ctx.lineTo(tailX,tailY); ctx.strokeStyle=grad; ctx.lineWidth=2.2; ctx.stroke();
        ctx.beginPath(); ctx.arc(headX,headY,2.8,0,Math.PI*2); ctx.fillStyle=`rgba(255,220,160,${s.opacity*0.8})`; ctx.fill();
      }
    }

    // Render function (unchanged max visuals, includes drawShootingStars call at end)
    function render() {
      // ... (all drawing code)
      drawShootingStars();
    }

    // Interaction (unchanged, but modified to cancel follow on tap of followed star)
    function startFollowing(starId) {
      followingStarId = starId;
      document.getElementById("releaseBtn").classList.add("visible");
    }
    function stopFollowing() {
      followingStarId = null;
      document.getElementById("releaseBtn").classList.remove("visible");
    }
    document.getElementById("releaseBtn").addEventListener("click", stopFollowing);

    function worldPos(px,py) { return { x:(px-w/2)/camera.zoom-camera.x, y:(py-h/2)/camera.zoom-camera.y }; }
    function hitTest(px,py) { /* same */ }
    // ... (other interaction functions identical)

    // Modify touch/mouse to stop follow when tapping followed star
    canvas.addEventListener("touchstart",(e)=>{
      e.preventDefault();
      if(e.touches.length!==1){ endPan(); return; }
      let touch = e.touches[0];
      let star = hitTest(touch.clientX, touch.clientY);
      let constellation = hitTestConstellationCentroid(touch.clientX, touch.clientY);
      if (constellation && constellation.starIds.length>=3) {
        promptConstellationName(constellation); endPan(); return;
      }
      if(star){
        if (followingStarId === star.id) {
          stopFollowing();
          endPan();
          return;
        }
        showPreview(star, touch.clientX, touch.clientY);
        let now = Date.now();
        if(now-lastTap<300){
          clearTimeout(longPressTimer);
          openEdit(star.id);
          lastTap=0;
        }else{
          lastTap=now;
          longPressTimer=setTimeout(()=>{
            startFollowing(star.id);
            longPressTimer=null;
          },500);
        }
        endPan();
      }else{
        startPan(touch.clientX, touch.clientY);
        lastTap=0;
      }
    });

    // Mouse: single click on followed star stops following
    canvas.addEventListener("mousedown",(e)=>{
      let star = hitTest(e.clientX, e.clientY);
      if(star){
        if (followingStarId === star.id) {
          stopFollowing();
          endMousePan();
          return;
        }
        showPreview(star, e.clientX, e.clientY);
        if (lastMouseDownStar && lastMouseDownStar.id === star.id && Date.now() - lastMouseDownTime < 300) {
          clearTimeout(mouseLongPressTimer);
          mouseLongPressTimer = null;
          openEdit(star.id);
          lastMouseDownStar = null;
          endMousePan();
          return;
        }
        if (mouseLongPressTimer) clearTimeout(mouseLongPressTimer);
        mouseLongPressTimer = setTimeout(() => {
          startFollowing(star.id);
          mouseLongPressTimer = null;
        }, 500);
        lastMouseDownStar = star;
        lastMouseDownTime = Date.now();
        endMousePan();
      } else {
        startMousePan(e.clientX, e.clientY);
        lastMouseDownStar = null;
        if (mouseLongPressTimer) { clearTimeout(mouseLongPressTimer); mouseLongPressTimer = null; }
      }
    });

    // ... rest of pan/zoom/keyboard identical

    function animate(){
      simulate();
      updateShootingStars();
      render();
      requestAnimationFrame(animate);
    }

    function init() {
      resize();
      listenToFirestore();
      updateCounter();
      nextShootingStar = 60;
    }
    init();
    animate();
  }
</script>
</body>
</html>
