<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>✦ SYNC CONSTELLATION · PAN ENABLED</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
    body{width:100%;height:100%;overflow:hidden;background:#000;font-family:monospace;position:fixed;inset:0}
    canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:grab}        /* ← changed */
    canvas:active{cursor:grabbing}                                                             /* ← added */
    .hud{position:absolute;top:20px;left:24px;right:24px;display:flex;justify-content:space-between;z-index:100;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);padding:6px 18px;border-radius:60px}
    .title{font-size:9px;letter-spacing:0.4em;color:#bec8e6}
    .meta{font-size:9px;color:#a0aac8;background:#0006;padding:4px 12px;border-radius:30px}
    .controls{position:absolute;bottom:24px;left:24px;right:24px;z-index:98;pointer-events:none}
    .timeline-container{background:#0008;backdrop-filter:blur(16px);border-radius:60px;padding:8px 16px;pointer-events:auto}
    .timeline-label{font-size:7px;color:#b4beec99;margin-bottom:6px}
    input[type="range"]{width:100%;background:#646c8c4d;height:2px;-webkit-appearance:none}
    input[type="range"]::-webkit-slider-thumb{width:14px;height:14px;border-radius:50%;background:#d2e1ff;cursor:pointer}
    .instructions{position:absolute;bottom:90px;right:24px;font-size:8px;color:#8c96b4;background:#0008;padding:6px 14px;border-radius:30px;pointer-events:none}
    .add{position:absolute;right:24px;bottom:90px;width:56px;height:56px;border-radius:56px;background:radial-gradient(circle at 30% 30%,#46506e,#191928);backdrop-filter:blur(20px);color:#e6f0ff;font-size:28px;border:none;z-index:120;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .add:active{transform:scale(0.92)}
    .sync-btn{position:absolute;right:24px;top:90px;width:44px;height:44px;border-radius:44px;background:#0008;backdrop-filter:blur(12px);border:0.5px solid #828caa66;color:#c8d6ff;font-size:18px;z-index:120;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .sync-btn:active{transform:scale(0.92)}
    .share-link-btn{position:absolute;left:24px;bottom:90px;width:44px;height:44px;border-radius:44px;background:#0008;backdrop-filter:blur(12px);border:0.5px solid #828caa66;color:#c8d6ff;font-size:18px;z-index:120;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .share-link-btn:active{transform:scale(0.92)}
    .modal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000d;backdrop-filter:blur(28px);z-index:300;opacity:0;transition:opacity 0.3s}
    .modal.visible{opacity:1}
    .panel{width:84%;max-width:440px;background:#0c0c14f0;backdrop-filter:blur(20px);border:1px solid #7882aa4d;border-radius:52px;padding:28px 24px;transform:scale(0.96);transition:transform 0.32s}
    .modal.visible .panel{transform:scale(1)}
    textarea,.viewer{width:100%;background:#02020ab3;border:1px solid #64739666;border-radius:38px;padding:20px;font-family:monospace;font-size:14px;color:#eef2ff;outline:none;resize:none}
    .viewer{min-height:240px;background:#02020a99}
    .actions{display:flex;gap:12px;margin-top:24px}
    .actions button{flex:1;height:50px;border-radius:60px;background:#1a1a26cc;color:#eef2ff;font-size:13px;cursor:pointer;border:none}
    .actions button:active{transform:scale(0.96)}
    .delete{color:#ff9b7c!important;background:#2a1c1ecc!important}
    .preview{position:absolute;max-width:240px;background:#000d;backdrop-filter:blur(28px);border-radius:32px;padding:12px 20px;border:0.5px solid #8ca0d24d;font-size:11px;color:#e0e6ff;pointer-events:none;z-index:220;opacity:0;transform:translateY(10px);transition:0.2s}
    .preview.visible{opacity:1;transform:translateY(0)}
    .vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 40%,#000b 95%);z-index:10}
    .notification{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:#000b;backdrop-filter:blur(20px);padding:8px 18px;border-radius:40px;font-size:11px;color:#ccd6ff;pointer-events:none;z-index:200;opacity:0;transition:0.2s;white-space:nowrap}
    .notification.show{opacity:1}
    .sync-panel{text-align:center}
    .sync-panel input{padding:8px;margin:10px;border-radius:30px;border:1px solid #446;background:#111;color:#fff;width:80%}
    .room-status{margin-top:10px;font-size:12px;color:#8a9eff}
  </style>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div id="app">
  <canvas id="cosmicCanvas"></canvas>
  <div class="vignette"></div>
  <div class="hud"><div class="title">✦ SYNC CONSTELLATION</div><div class="meta" id="counterMeta">0 stars</div></div>
  <div class="controls"><div class="timeline-container"><div class="timeline-label">⟡ time‑lapse</div><input type="range" id="timelineSlider" min="0" max="1" step="0.001" value="1"></div></div>
  <div class="instructions">drag → pan • tap → glimpse • double‑tap → open • long‑press → edit</div>
  <button class="add" id="novaBtn">✧</button>
  <button class="sync-btn" id="syncBtn">🔁</button>
  <button class="share-link-btn" id="shareLinkBtn">🔗</button>
  <div class="preview" id="etherPreview"></div>
  <div class="notification" id="toastMsg"></div>

  <div class="modal" id="viewModal"><div class="panel"><div class="viewer" id="memoryViewer"></div><div class="actions"><button id="closeViewBtn">close</button><button id="editFromViewBtn">edit</button></div></div></div>
  <div class="modal" id="editModal"><div class="panel"><textarea id="memoryEditor" placeholder="...a thought drifts..."></textarea><div class="actions"><button id="saveMemoryBtn">engrave</button><button id="cancelEditBtn">drift</button><button id="deleteMemoryBtn" class="delete">obliterate</button></div></div></div>
  <div class="modal" id="syncModal"><div class="panel sync-panel"><div style="margin-bottom:16px">✨ REAL‑TIME SYNC ✨</div><div><input type="text" id="roomIdInput" placeholder="Room ID"></div><div><button id="createRoomBtn">Create Room</button> <button id="joinRoomBtn">Join Room</button></div><div id="roomStatus" class="room-status">Not connected</div><div class="actions" style="margin-top:20px"><button id="closeSyncBtn">close</button></div></div></div>
  <div class="modal" id="clusterModal"><div class="panel"><div id="clusterNameDisplay" style="text-align:center; font-size:14px;"></div><div class="actions"><button id="closeClusterBtn">gaze further</button></div></div></div>
</div>

<script>
  (function() {
    // ---------- CORE CONSTELLATION (PAN ADDED) ----------
    const STORAGE_KEY = "constellation_working";
    let notes = [];
    let activeId = null;
    let camera = { x: 0, y: 0, zoom: 1.0, targetZoom: 1.0 };
    let w, h;
    const canvas = document.getElementById("cosmicCanvas");
    const ctx = canvas.getContext("2d");
    
    const SEED_CLUSTERS = [
      { name: "Pleiades", x: -320, y: -240, color: [100,115,160], radiance:0.08 },
      { name: "Hyades", x: 390, y: 110, color: [115,95,140], radiance:0.07 },
      { name: "Beehive", x: 750, y: -490, color: [130,105,95], radiance:0.06 },
      { name: "Double Cluster", x: -790, y: 510, color: [95,110,130], radiance:0.07 },
      { name: "Taurus", x: 110, y: -580, color: [85,80,115], radiance:0.08 },
      { name: "Orion's Sword", x: -170, y: 650, color: [105,95,125], radiance:0.07 }
    ];
    let galacticClusters = [...SEED_CLUSTERS];
    
    let starfield = [];
    for (let i=0;i<1200;i++) starfield.push({ x:(Math.random()-0.5)*3000, y:(Math.random()-0.5)*3000, size:Math.random()*1.2+0.3, brightness:Math.random()*0.5+0.2, colorTemp:[200+Math.random()*55,200+Math.random()*55,220+Math.random()*35] });
    
    let shootingStars = [], nextShootingStar = 60;
    let ageOffset = 0;
    
    function computeMass(note) { return Math.min(10, (note.text?.length||12)/40 + Math.min(2.5, (note.opened||0)/10)); }
    function starColor(ageMs) {
      const day=86400000, week=day*7, month=day*30;
      if(ageMs<day*3) return { core:"#aaccff", glow:"rgba(170,204,255,0.4)" };
      if(ageMs<week) return { core:"#ffdd99", glow:"rgba(255,221,153,0.35)" };
      if(ageMs<month) return { core:"#ffaa77", glow:"rgba(255,170,119,0.3)" };
      return { core:"#ff8866", glow:"rgba(255,136,102,0.25)" };
    }
    
    function createMemory(text = "") {
      let cluster = galacticClusters[Math.floor(Math.random() * galacticClusters.length)];
      let x = cluster.x + (Math.random() - 0.5) * 200;
      let y = cluster.y + (Math.random() - 0.5) * 200;
      const note = {
        id: Date.now() + Math.random() * 100000,
        created: Date.now(),
        opened: 0,
        text: text.trim() === "" ? "✦ a drifting thought" : text,
        x, y,
        vx: (Math.random() - 0.5) * 0.08,
        vy: (Math.random() - 0.5) * 0.08,
        radius: 2.5 + Math.random() * 3,
        mass: 2.5,
        orbitPhase: Math.random() * Math.PI * 2,
        pulsePhase: Math.random() * Math.PI * 2,
        sentiment: 0
      };
      note.mass = computeMass(note);
      notes.push(note);
      saveToLocal();
      updateCounter();
      syncSend({ type: "full", notes: notes });
      return note;
    }
    
    function updateNote(updatedNote) {
      let idx = notes.findIndex(n => n.id === updatedNote.id);
      if (idx !== -1) {
        notes[idx] = { ...notes[idx], ...updatedNote };
        saveToLocal();
        updateCounter();
        syncSend({ type: "update", note: updatedNote });
      }
    }
    
    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      saveToLocal();
      updateCounter();
      syncSend({ type: "delete", id: id });
    }
    
    function simulate() {
      for (let i=0; i<notes.length; i++) {
        let a = notes[i];
        a.pulsePhase += 0.01;
        for (let gc of galacticClusters) {
          let dx = gc.x - a.x, dy = gc.y - a.y;
          let dist = Math.hypot(dx, dy) + 40;
          let force = 0.00002 * (1 + a.mass/15);
          a.vx += dx * force / dist;
          a.vy += dy * force / dist;
        }
        for (let j=0; j<notes.length; j++) {
          if (i===j) continue;
          let b = notes[j];
          let dx = b.x - a.x, dy = b.y - a.y;
          let dist = Math.hypot(dx, dy) + 5;
          let pull = (b.mass * 0.00002) / dist;
          a.vx += dx * pull;
          a.vy += dy * pull;
        }
        a.vx *= 0.995;
        a.vy *= 0.995;
        a.x += a.vx;
        a.y += a.vy;
        let bound = 1500;
        if (Math.abs(a.x) > bound) a.vx *= 0.98;
        if (Math.abs(a.y) > bound) a.vy *= 0.98;
      }
      camera.zoom += (camera.targetZoom - camera.zoom) * 0.08;
      camera.targetZoom = Math.min(2.5, Math.max(0.45, camera.targetZoom));
    }
    
    function spawnShootingStar() {
      let angle = Math.random() * Math.PI * 2, speed = 5 + Math.random() * 8, len = 50 + Math.random() * 70, op = 0.4 + Math.random() * 0.5;
      let x,y, edge = Math.floor(Math.random() * 4);
      if (edge === 0) { x = -len*0.5; y = Math.random() * h; }
      else if (edge === 2) { x = w + len*0.5; y = Math.random() * h; }
      else if (edge === 1) { x = Math.random() * w; y = -len*0.5; }
      else { x = Math.random() * w; y = h + len*0.5; }
      shootingStars.push({ x,y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, length: len, opacity: op });
    }
    function updateShootingStars() {
      for (let i=0;i<shootingStars.length;i++) { let s=shootingStars[i]; s.x+=s.vx; s.y+=s.vy; if(s.x+s.length<0||s.x-s.length>w||s.y+s.length<0||s.y-s.length>h) shootingStars.splice(i--,1); }
      if (--nextShootingStar<=0) { spawnShootingStar(); nextShootingStar = Math.floor(150 + Math.random() * 400); }
    }
    function drawShootingStars() {
      for (let s of shootingStars) {
        let headX=s.x, headY=s.y, dir=Math.hypot(s.vx,s.vy); if(dir<0.01) continue;
        let tailX=s.x-s.vx*(s.length/dir), tailY=s.y-s.vy*(s.length/dir);
        let grad=ctx.createLinearGradient(headX,headY,tailX,tailY);
        grad.addColorStop(0,`rgba(255,240,200,${s.opacity})`); grad.addColorStop(1,`rgba(160,100,70,0)`);
        ctx.beginPath(); ctx.moveTo(headX,headY); ctx.lineTo(tailX,tailY); ctx.strokeStyle=grad; ctx.lineWidth=2.2; ctx.stroke();
        ctx.beginPath(); ctx.arc(headX,headY,2.8,0,Math.PI*2); ctx.fillStyle=`rgba(255,220,160,${s.opacity*0.8})`; ctx.fill();
      }
    }
    
    let previewStarId = null;
    function render() {
      ctx.clearRect(0,0,w,h);
      ctx.save();
      ctx.translate(w/2,h/2); ctx.scale(camera.zoom,camera.zoom); ctx.translate(camera.x,camera.y);
      for (let s of starfield) { ctx.fillStyle=`rgba(${s.colorTemp[0]},${s.colorTemp[1]},${s.colorTemp[2]},${s.brightness*0.6})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill(); }
      for (let gc of galacticClusters) { let grad=ctx.createRadialGradient(gc.x,gc.y,15,gc.x,gc.y,380); grad.addColorStop(0,`rgba(${gc.color[0]},${gc.color[1]},${gc.color[2]},0.07)`); grad.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(gc.x,gc.y,380,0,Math.PI*2); ctx.fill(); if(camera.zoom>0.9){ ctx.font=`${Math.max(8,11*camera.zoom)}px monospace`; ctx.fillStyle=`rgba(200,210,245,0.5)`; ctx.fillText(gc.name, gc.x-30, gc.y-45); } }
      if (notes.length>1) for(let i=0;i<notes.length;i++) for(let j=i+1;j<notes.length;j++){ let a=notes[i],b=notes[j]; if(Math.hypot(a.x-b.x,a.y-b.y)<200){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.strokeStyle=`rgba(140,170,210,0.25)`; ctx.lineWidth=0.8; ctx.stroke(); } }
      for (let star of notes) {
        let age = Math.max(0, Date.now() - star.created + ageOffset);
        let colors = starColor(age);
        let pulse = Math.sin(star.pulsePhase)*0.5;
        let size = Math.max(2.2, star.radius + pulse);
        let glow=ctx.createRadialGradient(star.x,star.y,size*0.5,star.x,star.y,size*8); glow.addColorStop(0,colors.glow); glow.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(star.x,star.y,size*8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=colors.core; ctx.beginPath(); ctx.arc(star.x,star.y,size,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="rgba(255,245,235,0.8)"; ctx.beginPath(); ctx.arc(star.x-0.8,star.y-0.8,size*0.4,0,Math.PI*2); ctx.fill();
        if (previewStarId===star.id) { ctx.beginPath(); ctx.arc(star.x,star.y,size*3,0,Math.PI*2); ctx.strokeStyle="rgba(220,230,255,0.8)"; ctx.lineWidth=1.8; ctx.stroke(); }
      }
      ctx.restore();
      drawShootingStars();
    }
    
    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
    function loadFromLocal() { let raw=localStorage.getItem(STORAGE_KEY); if(raw) try{ notes=JSON.parse(raw); for(let n of notes){ if(!n.vx){ n.vx=(Math.random()-0.5)*0.08; n.vy=(Math.random()-0.5)*0.08; n.orbitPhase=Math.random()*Math.PI*2; n.pulsePhase=Math.random()*Math.PI*2; n.mass=computeMass(n); } } }catch(e){} }
    function updateCounter() { document.getElementById("counterMeta").innerHTML = notes.length === 0 ? "empty sky" : `${notes.length} stars`; }
    
    // ========== REAL‑TIME SYNC ==========
    let peer = null;
    let connections = [];
    let roomId = null;
    let isHost = false;
    
    function showToast(msg) { let t=document.getElementById("toastMsg"); t.innerText=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }
    
    function syncSend(data) {
      if (!connections.length) return;
      let msg = JSON.stringify(data);
      for (let conn of connections) {
        if (conn.open) conn.send(msg);
      }
    }
    
    function handleSyncMessage(data) {
      if (data.type === "full") {
        let remoteNotes = data.notes;
        let merged = [...notes];
        for (let rn of remoteNotes) {
          let localIdx = merged.findIndex(n => n.id === rn.id);
          if (localIdx !== -1) merged[localIdx] = { ...merged[localIdx], ...rn };
          else merged.push(rn);
        }
        notes = merged;
        saveToLocal();
        updateCounter();
      } else if (data.type === "update") {
        let idx = notes.findIndex(n => n.id === data.note.id);
        if (idx !== -1) notes[idx] = { ...notes[idx], ...data.note };
        else notes.push(data.note);
        saveToLocal();
        updateCounter();
      } else if (data.type === "delete") {
        notes = notes.filter(n => n.id !== data.id);
        saveToLocal();
        updateCounter();
      }
    }
    
    function initPeer(room, host) {
      if (peer) peer.destroy();
      peer = new Peer();
      peer.on('open', (id) => {
        roomId = room;
        document.getElementById("roomStatus").innerText = `Room: ${roomId} (${host ? 'host' : 'joined'})`;
        if (host) {
          showToast(`Room created: ${roomId} (copied to clipboard)`);
        } else {
          let conn = peer.connect(room);
          conn.on('open', () => {
            connections.push(conn);
            conn.on('data', (d) => { try { handleSyncMessage(JSON.parse(d)); } catch(e){} });
            conn.send(JSON.stringify({ type: "full", notes: notes }));
          });
        }
        peer.on('connection', (conn) => {
          connections.push(conn);
          conn.on('data', (d) => { try { handleSyncMessage(JSON.parse(d)); } catch(e){} });
          conn.send(JSON.stringify({ type: "full", notes: notes }));
        });
      });
      peer.on('error', (err) => { console.warn(err); showToast("Sync error: " + err); });
    }
    
    function createRoom() {
      let newId = Math.random().toString(36).substring(2, 8).toUpperCase();
      initPeer(newId, true);
      navigator.clipboard.writeText(newId);
      showToast(`✨ Room created: ${newId} (copied to clipboard)`);
    }
    
    function joinRoom(id) {
      initPeer(id, false);
    }
    
    // UI handlers for sync
    document.getElementById("syncBtn").onclick = () => {
      document.getElementById("syncModal").style.display = "flex";
      requestAnimationFrame(() => document.getElementById("syncModal").classList.add("visible"));
    };
    document.getElementById("createRoomBtn").onclick = () => {
      createRoom();
      closeModal(document.getElementById("syncModal"));
    };
    document.getElementById("joinRoomBtn").onclick = () => {
      let rid = document.getElementById("roomIdInput").value.trim();
      if (rid) joinRoom(rid);
      closeModal(document.getElementById("syncModal"));
    };
    document.getElementById("closeSyncBtn").onclick = () => closeModal(document.getElementById("syncModal"));
    
    // Interaction helpers
    function worldPos(px,py) { return { x:(px-w/2)/camera.zoom-camera.x, y:(py-h/2)/camera.zoom-camera.y }; }
    function hitTest(px,py) { let wp=worldPos(px,py); let best=null,bestD=70; for(let n of notes){ let d=Math.hypot(wp.x-n.x,wp.y-n.y); let thresh=Math.min(80,35+n.radius*3.5); if(d<thresh && d<bestD){ bestD=d; best=n; } } return best; }
    let previewTimer=null;
    function showPreview(star,cx,cy){ previewStarId=star.id; let el=document.getElementById("etherPreview"); let short=star.text.length>85?star.text.slice(0,82)+"…":star.text; el.innerText=short; let left=Math.min(Math.max(cx-95,12),w-210), top=Math.min(Math.max(cy-85,28),h-100); el.style.left=left+"px"; el.style.top=top+"px"; el.classList.add("visible"); if(previewTimer) clearTimeout(previewTimer); previewTimer=setTimeout(()=>{ el.classList.remove("visible"); previewStarId=null; },1200); }
    function openView(id){ activeId=id; let star=notes.find(s=>s.id===id); if(star){ star.opened=(star.opened||0)+1; star.mass=computeMass(star); document.getElementById("memoryViewer").innerText=star.text; let modal=document.getElementById("viewModal"); modal.style.display="flex"; requestAnimationFrame(()=>modal.classList.add("visible")); saveToLocal(); syncSend({type:"update", note:star}); } }
    function openEdit(id){ activeId=id; let star=notes.find(s=>s.id===id); if(star){ document.getElementById("memoryEditor").value=star.text; let modal=document.getElementById("editModal"); modal.style.display="flex"; requestAnimationFrame(()=>modal.classList.add("visible")); document.getElementById("memoryEditor").focus(); } }
    function closeModal(modal){ modal.classList.remove("visible"); setTimeout(()=>modal.style.display="none",250); }
    function saveEdit(){ if(activeId){ let star=notes.find(s=>s.id===activeId); if(star){ star.text=document.getElementById("memoryEditor").value; if(!star.text.trim()) star.text="✦ a distant echo"; star.mass=computeMass(star); saveToLocal(); syncSend({type:"update", note:star}); } activeId=null; } closeModal(document.getElementById("editModal")); }
    function deleteMemory(){ if(activeId){ deleteNote(activeId); activeId=null; closeModal(document.getElementById("editModal")); } }
    
    // Add button
    document.getElementById("novaBtn").onclick = () => { let newStar = createMemory(""); openEdit(newStar.id); };
    document.getElementById("saveMemoryBtn").onclick = saveEdit;
    document.getElementById("cancelEditBtn").onclick = () => closeModal(document.getElementById("editModal"));
    document.getElementById("deleteMemoryBtn").onclick = deleteMemory;
    document.getElementById("closeViewBtn").onclick = () => closeModal(document.getElementById("viewModal"));
    document.getElementById("editFromViewBtn").onclick = () => { closeModal(document.getElementById("viewModal")); setTimeout(()=>{ if(activeId) openEdit(activeId); },100); };
    document.getElementById("closeClusterBtn").onclick = () => closeModal(document.getElementById("clusterModal"));
    document.getElementById("shareLinkBtn").onclick = () => {
      let url = new URL(window.location.href);
      let data = { notes: notes.map(n=>({ text:n.text, x:n.x, y:n.y, created:n.created })) };
      let compressed = btoa(encodeURIComponent(JSON.stringify(data)));
      url.hash = compressed;
      navigator.clipboard.writeText(url.href);
      showToast("✨ constellation link copied ✨");
    };
    document.getElementById("timelineSlider").oninput = (e) => { ageOffset = (1 - parseFloat(e.target.value)) * 86400000 * 60; };
    
    // ========== PAN / DRAG LOGIC (NEW) ==========
    let isPanning = false;
    let panStart = { x:0, y:0 };
    let panCameraStart = { x:0, y:0 };
    let isMousePanning = false;
    let mousePanStart = { x:0, y:0 };
    let mouseCameraStart = { x:0, y:0 };
    const PAN_THRESHOLD = 5; // pixels before pan activates

    function startPan(clientX, clientY) {
      isPanning = true;
      panStart = { x: clientX, y: clientY };
      panCameraStart = { x: camera.x, y: camera.y };
    }

    function movePan(clientX, clientY) {
      if (!isPanning) return;
      let dx = clientX - panStart.x;
      let dy = clientY - panStart.y;
      camera.x = panCameraStart.x + dx / camera.zoom;
      camera.y = panCameraStart.y + dy / camera.zoom;
    }

    function endPan() {
      isPanning = false;
    }

    function startMousePan(clientX, clientY) {
      isMousePanning = true;
      mousePanStart = { x: clientX, y: clientY };
      mouseCameraStart = { x: camera.x, y: camera.y };
    }

    function moveMousePan(clientX, clientY) {
      if (!isMousePanning) return;
      let dx = clientX - mousePanStart.x;
      let dy = clientY - mousePanStart.y;
      camera.x = mouseCameraStart.x + dx / camera.zoom;
      camera.y = mouseCameraStart.y + dy / camera.zoom;
    }

    function endMousePan() {
      isMousePanning = false;
    }

    // ========== TOUCH HANDLERS (UPDATED) ==========
    let longPressTimer=null, lastTap=0;
    canvas.addEventListener("touchstart",(e)=>{
      e.preventDefault();
      if(e.touches.length !== 1) {
        // multi-touch: reset pan just in case
        endPan();
        return;
      }
      let touch = e.touches[0];
      let star = hitTest(touch.clientX, touch.clientY);
      if (star) {
        // touched a star → normal tap/long-press flow
        showPreview(star, touch.clientX, touch.clientY);
        let now = Date.now();
        if (now - lastTap < 300) {
          clearTimeout(longPressTimer);
          openView(star.id);
          lastTap = 0;
        } else {
          lastTap = now;
          longPressTimer = setTimeout(() => {
            openEdit(star.id);
            longPressTimer = null;
          }, 500);
        }
        // cancel any panning
        endPan();
      } else {
        // touched empty space → start pan after threshold
        startPan(touch.clientX, touch.clientY);
        // clear tap sequence
        lastTap = 0;
      }
    });

    canvas.addEventListener("touchmove",(e)=>{
      e.preventDefault();
      if (e.touches.length === 2) {
        // pinch zoom
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let dist = Math.hypot(dx, dy);
        if (pinchDist === null) pinchDist = dist;
        else {
          let scale = dist / pinchDist;
          camera.targetZoom = Math.min(2.5, Math.max(0.45, camera.targetZoom * scale));
          pinchDist = dist;
        }
        endPan(); // stop panning during pinch
      } else if (e.touches.length === 1 && isPanning) {
        // single finger panning
        movePan(e.touches[0].clientX, e.touches[0].clientY);
        // cancel long press if we were on a star but started panning
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      }
      // reset pinch distance if not two fingers
      if (e.touches.length !== 2) pinchDist = null;
    });

    canvas.addEventListener("touchend",(e)=>{
      e.preventDefault();
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      endPan();
      pinchDist = null;
    });

    canvas.addEventListener("touchcancel",()=>{
      if (longPressTimer) clearTimeout(longPressTimer);
      endPan();
      pinchDist = null;
    });

    // Pinch distance storage
    let pinchDist = null;

    // ========== MOUSE HANDLERS (UPDATED) ==========
    let clickTimer = null;
    canvas.addEventListener("mousedown",(e)=>{
      let star = hitTest(e.clientX, e.clientY);
      if (star) {
        showPreview(star, e.clientX, e.clientY);
        clickTimer = setTimeout(() => openView(star.id), 200);
        endMousePan();
      } else {
        // empty space → start pan
        startMousePan(e.clientX, e.clientY);
      }
    });

    window.addEventListener("mousemove",(e)=>{
      if (isMousePanning) {
        moveMousePan(e.clientX, e.clientY);
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      }
    });

    window.addEventListener("mouseup",(e)=>{
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      endMousePan();
    });

    // Prevent default behavior on canvas to avoid text selection during drag
    canvas.addEventListener("dragstart", (e) => e.preventDefault());
    
    function resize() { w=innerWidth; h=innerHeight; canvas.width=w*devicePixelRatio; canvas.height=h*devicePixelRatio; canvas.style.width=w+"px"; canvas.style.height=h+"px"; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
    window.addEventListener("resize",resize);
    function animate(){ simulate(); updateShootingStars(); render(); requestAnimationFrame(animate); }
    
    function init() {
      resize();
      if (window.location.hash.length > 1) {
        try {
          let hash = window.location.hash.slice(1);
          let data = JSON.parse(decodeURIComponent(atob(hash)));
          if (data.notes) {
            notes = data.notes.map(n => ({
              id: Date.now() + Math.random()*100000,
              text: n.text,
              x: n.x, y: n.y,
              created: n.created,
              opened: 0,
              vx: (Math.random()-0.5)*0.08,
              vy: (Math.random()-0.5)*0.08,
              radius: 2.5 + Math.random()*3,
              mass: 2.5,
              orbitPhase: Math.random()*Math.PI*2,
              pulsePhase: Math.random()*Math.PI*2
            }));
            saveToLocal();
          }
        } catch(e) {}
      } else {
        loadFromLocal();
      }
      if (notes.length === 0) {
        let seedTexts = ["a cold wind through the pines","the last ember of a dying fire","distant thunder over the hills","fog lifting from the river at dawn","the scent of rain on dry earth","an old photograph, faded at the edges"];
        for (let txt of seedTexts) createMemory(txt);
      }
      if (notes.length) {
        let avgX = notes.reduce((s,n)=>s+n.x,0)/notes.length;
        let avgY = notes.reduce((s,n)=>s+n.y,0)/notes.length;
        camera.x = -avgX; camera.y = -avgY;
      }
      updateCounter();
      nextShootingStar = 60;
    }
    init(); animate();
  })();
</script>
</body>
