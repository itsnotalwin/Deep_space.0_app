          life: 2 + Math.random()*3, size: 1 + Math.random()*2.5,
          color: `hsl(${30 + Math.random()*40}, 80%, 60%)`
        });
      }
    }
    function updateDecayTrails(deltaTime) {
      for (let i=decayParticles.length-1; i>=0; i--) {
        let p = decayParticles[i];
        p.x += p.vx * deltaTime; p.y += p.vy * deltaTime;
        p.life -= deltaTime;
        if (p.life <= 0) decayParticles.splice(i,1);
      }
    }

      flowParticles=[]; for(let i=0;i<600;i++) flowParticles.push({ x:(Math.random()-0.5)*5000, y:(Math.random()-0.5)*5000, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4, life:Math.random()*100, size:1+Math.random()*3 });

    // Spiral galaxy parameters
    let galaxyRotation = 0;
    function drawSpiralGalaxy(ctx, cx, cy, camX, camY, zoom){
      // Draw a faint spiral galaxy at world center (0,0) with parallax 0.15
      let gx = 0 - camX * 0.15;
      let gy = 0 - camY * 0.15;
      let size = 900 * (0.8 + 0.2 * Math.sin(time * 0.0002));

        let angleOffset = arm * Math.PI * 2 / 3;
        for (let r = 0.3; r <= 1.0; r += 0.07) {
          let rad = size * r;
          let angle = r * Math.PI * 6 + angleOffset + galaxyRotation;
          let x = Math.cos(angle) * rad;
          let y = Math.sin(angle) * rad * 0.4;
          ctx.beginPath();
          ctx.ellipse(x, y, size * 0.12, size * 0.04, angle, 0, Math.PI*2);
          ctx.fillStyle = `rgba(160, 180, 220, ${0.04 * (1 - r)})`;
          ctx.fill();

      let grad = ctx.createRadialGradient(0,0,0,0,0,size*0.25);
      grad.addColorStop(0, "rgba(220, 200, 160, 0.2)");
      grad.addColorStop(1, "rgba(100, 80, 60, 0)");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(0,0,size*0.25,0,Math.PI*2); ctx.fill();

      ctx.restore();
    }

    function updateNebulaColors() { /* same as before */ for(let neb of nebulaLayers){ let infR=0,infG=0,infB=0,tW=0; for(let star of notes){ let dx=star.x-neb.x, dy=star.y-neb.y, dist=Math.hypot(dx,dy); if(dist<300){ let w=(1-dist/300)*(star.mass||2); let age=Math.max(0,Date.now()-star.created); let r,g,b; if(age<86400000*3){r=120;g=180;b=255;} else if(age<86400000*7){r=255;g=200;b=120;} else {r=255;g=120;b=100;} infR+=r*w; infG+=g*w; infB+=b*w; tW+=w; } } if(tW>0.1){ let tR=infR/tW, tG=infG/tW, tB=infB/tW; neb.color1=[Math.floor(neb.baseColor1[0]*0.3+tR*0.7), Math.floor(neb.baseColor1[1]*0.3+tG*0.7), Math.floor(neb.baseColor1[2]*0.3+tB*0.7)]; neb.color2=[Math.floor(neb.baseColor2[0]*0.3+tR*0.7), Math.floor(neb.baseColor2[1]*0.3+tG*0.7), Math.floor(neb.baseColor2[2]*0.3+tB*0.7)]; neb.color3=[Math.floor(neb.baseColor3[0]*0.3+tR*0.7), Math.floor(neb.baseColor3[1]*0.3+tG*0.7), Math.floor(neb.baseColor3[2]*0.3+tB*0.7)]; } else { neb.color1=[...neb.baseColor1]; neb.color2=[...neb.baseColor2]; neb.color3=[...neb.baseColor3]; } } }

    // Star type differentiation helper
    function getStarVisuals(star){

        type = "whiteDwarf";
        coreColor = "#eef4ff";
        sizeMulti = 0.6;
        pulseSpeed = 0.005;
      } else if (ageDays < 3) {
        type = "youngBlue";
        coreColor = "#c0d4ff";
        sizeMulti = 0.9;
        pulseSpeed = 0.012;
      } else if (ageDays > 30) {
        type = "redGiant";
        coreColor = "#ff8866";
        sizeMulti = 1.4;
        pulseSpeed = 0.005;
      } else {
        type = "yellowMain";
        coreColor = "#ffddaa";
        sizeMulti = 1.0;
        pulseSpeed = 0.008;

    function addBirthSparks(x,y){ for(let i=0;i<60;i++){ let a=Math.random()*Math.PI*2, sp=0.5+Math.random()*2.5; sparks.push({x:x,y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.8+Math.random()*1.2, color:`hsl(${30+Math.random()*60},100%,60%)`}); } }

      ctx.save(); for(let sun of notes.filter(n=>n.isSun)){ ctx.setLineDash([6,10]); ctx.lineDashOffset=time*0.007; for(let planet of notes.filter(p=>p.orbitingSunId===sun.id)){ ctx.beginPath(); ctx.arc(sun.x,sun.y,planet.orbitRadius,0,Math.PI*2); ctx.strokeStyle="rgba(170,200,250,0.45)"; ctx.stroke(); } } ctx.restore();
      for(let gc of galacticClusters){ let g=ctx.createRadialGradient(gc.x,gc.y,20,gc.x,gc.y,400); g.addColorStop(0,`rgba(${gc.color[0]},${gc.color[1]},${gc.color[2]},0.1)`); g.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(gc.x,gc.y,400,0,Math.PI*2); ctx.fill(); if(camera.zoom>0.55){ ctx.font=`${Math.max(11,16*camera.zoom)}px "Segoe UI", system-ui, sans-serif`; ctx.fillStyle=`rgba(230,240,255,${0.6*Math.min(1,(camera.zoom-0.45)/0.4)})`; ctx.shadowBlur=6; ctx.shadowColor="rgba(100,150,255,0.4)"; ctx.fillText(gc.name,gc.x-40,gc.y-60); ctx.shadowBlur=0; } }

    function simulateMotion(deltaTime){
      for(let note of notes){ if(!note.isSun){ note.vx=(note.vx||0)*0.996; note.vy=(note.vy||0)*0.996; note.x+=note.vx; note.y+=note.vy; note.pulsePhase=(note.pulsePhase||0)+0.008; } }
      camera.zoom+=(camera.targetZoom-camera.zoom)*0.08;
      if(followingStarId){ let star=notes.find(n=>n.id===followingStarId); if(star){ camera.x+=(-star.x-camera.x)*0.07; camera.y+=(-star.y-camera.y)*0.07; camera.targetZoom=Math.min(2.6,camera.targetZoom*0.99+1.6*0.01); } else stopFollowing(); }
      updateSparks(deltaTime); updateDecayTrails(deltaTime);
    }
    function updateComets(){ if(Math.random()<0.0025){ let a=Math.random()*Math.PI*2, sp=1.8+Math.random()*2.5; comets.push({ x:Math.cos(a)*2600, y:Math.sin(a)*2600, vx:-Math.cos(a)*sp, vy:-Math.sin(a)*sp, life:550+Math.random()*350 }); } for(let i=comets.length-1;i>=0;i--){ let c=comets[i]; c.x+=c.vx; c.y+=c.vy; c.life--; if(c.life<=0) comets.splice(i,1); } }

    function autoNameUnnamedClusters(){ for(let cl of currentClusters) if(!cl.name && cl.starIds.length>=3){ let existing=namedConstellations.find(c=>c.starIds.join(',')===cl.starIds.join(',')); if(!existing){ let newName=autoNames[Math.floor(Math.random()*autoNames.length)]; while(namedConstellations.some(c=>c.name===newName)) newName+=" "+Math.floor(Math.random()*100+1); namedConstellations.push({starIds:cl.starIds,name:newName}); constellationsCollection.doc(cl.starIds.join(',')).set({starIds:cl.starIds,name:newName}); showToast(`✨ New constellation: ${newName}`); } } }
    function computeClusters(){ const thr=215; let vis=new Set(), clusters=[]; for(let i=0;i<notes.length;i++){ if(vis.has(i)) continue; let comp=[], q=[i]; vis.add(i); while(q.length){ let idx=q.pop(); comp.push(idx); for(let j=0;j<notes.length;j++) if(!vis.has(j) && Math.hypot(notes[idx].x-notes[j].x, notes[idx].y-notes[j].y)<thr){ vis.add(j); q.push(j); } } if(comp.length>=3){ let cx=0,cy=0; for(let idx of comp){ cx+=notes[idx].x; cy+=notes[idx].y; } cx/=comp.length; cy/=comp.length; let starIds=comp.map(i=>notes[i].id); let name=null; for(let nc of namedConstellations) if(nc.starIds.length===starIds.length && nc.starIds.every(id=>starIds.includes(id))){ name=nc.name; break; } clusters.push({starIds,centroid:{x:cx,y:cy},name}); } } currentClusters=clusters; }
    function updateCounter(){ let total=notes.length+tempStars.length; document.getElementById("counterMeta").innerHTML=`<span class="star-count-icon"></span> ${total===0?"empty sky":`${total} stars`}`; }
    function showToast(msg){ let t=document.getElementById("toastMsg"); t.innerText=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }
    async function saveNoteToFirestore(note){ await notesCollection.doc(note.id).set(note); }
    async function deleteNoteFromFirestore(id){ await notesCollection.doc(id).delete(); }
    function createMemory(text=""){
      let cluster=galacticClusters[Math.floor(Math.random()*galacticClusters.length)];
      let x=cluster.x+(Math.random()-0.5)*750, y=cluster.y+(Math.random()-0.5)*750;
      let note={ id:Date.now()+Math.random().toString(36), created:Date.now(), opened:0, text:text.trim()===""?"✦ a drifting thought":text, x, y, vx:(Math.random()-0.5)*0.07, vy:(Math.random()-0.5)*0.07, radius:3.2+Math.random()*4, pulsePhase:Math.random()*Math.PI*2, creatorId:localPeerId, creatorName:localPeerName, isSun:false, mass:2+Math.random()*5, orbitingSunId:null, orbitRadius:0, orbitAngle:0, orbitSpeed:0, orbitDirection:1 };
      notes.push(note); saveNoteToFirestore(note); updateCounter(); computeClusters(); addBirthSparks(x,y); return note;
    }
    function listenToTempStars(){
      tempStarsCollection.onSnapshot((snap)=>{ snap.docChanges().forEach((ch)=>{ let d=ch.doc.data(); if(ch.type==="added") tempStars.push(d); else if(ch.type==="modified"){ let idx=tempStars.findIndex(s=>s.id===d.id); if(idx!==-1) tempStars[idx]=d; } else if(ch.type==="removed"){ let removed=tempStars.find(s=>s.id===ch.doc.id); if(removed) addDecayTrail(removed.x,removed.y); tempStars=tempStars.filter(s=>s.id!==ch.doc.id); } }); updateCounter(); let now=Date.now(); tempStars.forEach(async(s)=>{ if(s.expiresAt<now) await deleteTempStar(s.id); }); });
    }
    function listenToFirestore(){
      notesCollection.onSnapshot((snap)=>{ snap.docChanges().forEach((ch)=>{ if(ch.type==="added"||ch.type==="modified"){ let d=ch.doc.data(); let idx=notes.findIndex(n=>n.id===d.id); if(idx!==-1) notes[idx]={...notes[idx],...d}; else notes.push(d); } else if(ch.type==="removed"){ let removed=notes.find(n=>n.id===ch.doc.id); if(removed) addDecayTrail(removed.x,removed.y); notes=notes.filter(n=>n.id!==ch.doc.id); } }); updateCounter(); computeClusters(); autoNameUnnamedClusters(); });
      constellationsCollection.onSnapshot((snap)=>{ snap.docChanges().forEach((ch)=>{ let d=ch.doc.data(); let e=namedConstellations.findIndex(c=>c.starIds.join(',')===d.starIds.join(',')); if(ch.type==="added"||ch.type==="modified"){ if(e!==-1) namedConstellations[e]=d; else namedConstellations.push(d); } else if(ch.type==="removed") namedConstellations=namedConstellations.filter(c=>c.starIds.join(',')!==d.starIds.join(',')); }); });
    }
    function stopFollowing(){ followingStarId=null; document.getElementById("releaseBtn").classList.remove("visible"); }

    function initApp(){
      initWorld();
      const canvasElem=document.getElementById("cosmicCanvas");
      function resize(){ w=innerWidth; h=innerHeight; canvasElem.width=w*devicePixelRatio; canvasElem.height=h*devicePixelRatio; canvasElem.style.width=w+"px"; canvasElem.style.height=h+"px"; ctx=canvasElem.getContext("2d"); ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
      resize(); window.addEventListener("resize",resize);
      listenToFirestore(); listenToTempStars(); updateCounter(); updateStreakCounter(); checkDailyNotification(); spawnDailyTempStars();
      let uiHidden=false;
      document.getElementById("hudToggle").addEventListener("click",()=>{ uiHidden=!uiHidden; document.getElementById("app").classList.toggle("ui-hidden",uiHidden); });
      document.getElementById("novaBtn").onclick=()=>{ let ns=createMemory(""); openEdit(ns.id); };
      document.getElementById("releaseBtn").onclick=stopFollowing;
      function worldPos(px,py){ return { x:(px-w/2)/camera.zoom-camera.x, y:(py-h/2)/camera.zoom-camera.y }; }
      function hitTest(px,py){ let wp=worldPos(px,py); let best=null,bestD=85; for(let n of notes){ let d=Math.hypot(wp.x-n.x,wp.y-n.y); let thr=Math.min(85,38+(n.radius||3)*2.8); if(d<thr && d<bestD){ bestD=d; best=n; } } for(let t of tempStars){ let d=Math.hypot(wp.x-t.x,wp.y-t.y); if(d<25 && d<bestD){ bestD=d; best=t; } } return best; }
      function hitTestConstellation(px,py){ let wp=worldPos(px,py); for(let cl of currentClusters) if(cl.starIds.length>=3 && Math.hypot(wp.x-cl.centroid.x, wp.y-cl.centroid.y)<60) return cl; return null; }
      let previewTimer;
      function showPreview(star,cx,cy){ if(previewTimer) clearTimeout(previewTimer); previewStarId=star.id; let creatorInfo="", text=""; if(star.isTemp){ creatorInfo=`<div class="creator-tag">✨ ${star.isSpecial ? "★ SPECIAL EPHEMERAL ★" : "ephemeral"} · fades soon</div>`; text=star.message||"a passing wish"; }else{ creatorInfo=(star.creatorName && star.creatorName!==localPeerName)?`<div class="creator-tag">from ${star.creatorName}</div>`:""; text=star.text.length>85?star.text.slice(0,82)+"…":star.text; } document.getElementById("etherPreview").innerHTML=creatorInfo+"“"+text+"”"; let left=Math.min(Math.max(cx-120,12),w-260), top=Math.min(Math.max(cy-80,28),h-100); let pd=document.getElementById("etherPreview"); pd.style.left=left+"px"; pd.style.top=top+"px"; pd.classList.add("visible"); previewTimer=setTimeout(()=>{ document.getElementById("etherPreview").classList.remove("visible"); previewStarId=null; },1300); }
      function openEdit(id){ let star=notes.find(s=>s.id===id); if(!star) return; activeId=id; document.getElementById("editCreator").innerText=star.creatorName?`created by ${star.creatorName}`:""; document.getElementById("memoryEditor").value=star.text; let modal=document.getElementById("editModal"); modal.style.display="flex"; requestAnimationFrame(()=>modal.classList.add("visible")); }
      function saveEdit(){ if(activeId){ let star=notes.find(s=>s.id===activeId); if(star){ star.text=document.getElementById("memoryEditor").value; if(!star.text.trim()) star.text="✦ a distant echo"; saveNoteToFirestore(star); } activeId=null; } closeModal(document.getElementById("editModal")); }
      function closeModal(m){ m.classList.remove("visible"); setTimeout(()=>m.style.display="none",250); }
      document.getElementById("saveMemoryBtn").onclick=saveEdit;
      document.getElementById("cancelEditBtn").onclick=()=>closeModal(document.getElementById("editModal"));
      document.getElementById("deleteMemoryBtn").onclick=()=>{ if(activeId){ deleteNote(activeId); activeId=null; closeModal(document.getElementById("editModal")); } };
      document.getElementById("closeViewBtn").onclick=()=>closeModal(document.getElementById("viewModal"));
      document.getElementById("editFromViewBtn").onclick=()=>{ closeModal(document.getElementById("viewModal")); setTimeout(()=>{ if(activeId) openEdit(activeId); },100); };
      let currentClusterForName=null;
      function promptConstellationName(cl){ currentClusterForName=cl; document.getElementById("constellationNameInput").value=cl.name||""; let m=document.getElementById("constellationNameModal"); m.style.display="flex"; requestAnimationFrame(()=>m.classList.add("visible")); }
      document.getElementById("saveConstellationName").onclick=()=>{ let name=document.getElementById("constellationNameInput").value.trim(); if(name && currentClusterForName){ let existing=namedConstellations.findIndex(c=>c.starIds.join(',')===currentClusterForName.starIds.join(',')); if(existing!==-1) namedConstellations[existing].name=name; else namedConstellations.push({starIds:currentClusterForName.starIds,name}); constellationsCollection.doc(currentClusterForName.starIds.join(',')).set({starIds:currentClusterForName.starIds,name}); showToast(`Constellation named: ${name}`); } closeModal(document.getElementById("constellationNameModal")); currentClusterForName=null; };
      document.getElementById("cancelConstellationName").onclick=()=>{ closeModal(document.getElementById("constellationNameModal")); currentClusterForName=null; };
      let isPan=false, panStart={x:0,y:0}, camStart={x:0,y:0}, lastTapTime=0, pendingSingleClick=null;
      canvasElem.addEventListener("touchstart",(e)=>{ e.preventDefault(); let t=e.touches[0]; let star=hitTest(t.clientX,t.clientY); let cl=hitTestConstellation(t.clientX,t.clientY); if(cl){ promptConstellationName(cl); return; } if(star){ let now=Date.now(); if(now-lastTapTime<300){ if(pendingSingleClick) clearTimeout(pendingSingleClick); if(!star.isTemp) openEdit(star.id); else{ if(star.isSpecial){ let rewarded=addToStreak(1); if(rewarded) showToast("✨ Special star! +1 to your streak ✨"); else showToast("✨ Special star (already claimed today) ✨"); } else showToast("✨ ephemeral stars cannot be edited."); } lastTapTime=0; } else{ lastTapTime=now; pendingSingleClick=setTimeout(()=>{ showPreview(star,t.clientX,t.clientY); pendingSingleClick=null; },150); } } else{ isPan=true; panStart={x:t.clientX,y:t.clientY}; camStart={x:camera.x,y:camera.y}; if(pendingSingleClick){ clearTimeout(pendingSingleClick); pendingSingleClick=null; } } });
      canvasElem.addEventListener("touchmove",(e)=>{ if(isPan && e.touches.length===1){ let dx=e.touches[0].clientX-panStart.x, dy=e.touches[0].clientY-panStart.y; camera.x=camStart.x+dx/camera.zoom; camera.y=camStart.y+dy/camera.zoom; } e.preventDefault(); if(pendingSingleClick){ clearTimeout(pendingSingleClick); pendingSingleClick=null; } });
      canvasElem.addEventListener("touchend",()=>{ isPan=false; });
      canvasElem.addEventListener("mousedown",(e)=>{ let star=hitTest(e.clientX,e.clientY); let cl=hitTestConstellation(e.clientX,e.clientY); if(cl){ promptConstellationName(cl); return; } if(star){ if(e.detail===2){ if(!star.isTemp) openEdit(star.id); else{ if(star.isSpecial){ let rewarded=addToStreak(1); if(rewarded) showToast("✨ Special star! +1 to your streak ✨"); else showToast("✨ Special star (already claimed today) ✨"); } else showToast("✨ ephemeral stars cannot be edited."); } } else{ showPreview(star,e.clientX,e.clientY); } } else{ isPan=true; panStart={x:e.clientX,y:e.clientY}; camStart={x:camera.x,y:camera.y}; } });
      window.addEventListener("mousemove",(e)=>{ if(isPan){ let dx=e.clientX-panStart.x, dy=e.clientY-panStart.y; camera.x=camStart.x+dx/camera.zoom; camera.y=camStart.y+dy/camera.zoom; } });
      window.addEventListener("mouseup",()=>{ isPan=false; });
      canvasElem.addEventListener("wheel",(e)=>{ e.preventDefault(); let delta=e.deltaY>0?0.92:1.08; camera.targetZoom=Math.min(2.6,Math.max(0.42,camera.targetZoom*delta)); },{passive:false});
      let lastTimestamp=0;
      function animateLoop(now){ let delta=Math.min(0.033,(now-lastTimestamp)/1000); lastTimestamp=now; time=now; galaxyRotation+=0.001; updateFlowField(time); updateOrganic(time); updateFlowParticles(); updateComets(); updateNebulaColors(); simulateMotion(delta); render(); requestAnimationFrame(animateLoop); }
      requestAnimationFrame(animateLoop);
    }
    function starColor(ageMs){ const day=86400000, week=day*7, month=day*30; if(ageMs<day*3) return { core:"#c0d4ff", glow:"rgba(180,200,255,0.6)" }; if(ageMs<week) return { core:"#ffddaa", glow:"rgba(255,221,170,0.5)" }; if(ageMs<month) return { core:"#ffaa77", glow:"rgba(255,170,119,0.4)" }; return { core:"#ff8866", glow:"rgba(255,136,102,0.35)" }; }

    if (!localPeerName || localPeerName === 'me') {
      document.getElementById('nameModal').style.display = 'flex';
      requestAnimationFrame(() => document.getElementById('nameModal').classList.add('visible'));
      document.getElementById('saveNameBtn').onclick = () => {
        let name = document.getElementById('nameInput').value.trim();
        if (!name) name = 'stargazer';
        startApp(name);
      };
    } else { initApp(); }
    function startApp(name) { localPeerName = name; localStorage.setItem('constellation_peer_name', name); document.getElementById('nameModal').classList.remove('visible'); setTimeout(()=>document.getElementById('nameModal').style.display='none',350); initApp(); }
  })();
</script>
