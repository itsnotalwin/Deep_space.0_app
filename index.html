<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>✧ C O N S T E L L A T I O N · C E L E S T I A L ✧</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'SF Pro Text', 'Inter', system-ui, -apple-system, sans-serif;
      position: fixed;
      inset: 0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at 30% 40%, #050510 0%, #000000 100%);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    canvas.pointing-at-star {
      cursor: pointer;
    }
    canvas.following-star {
      cursor: crosshair;
    }

    .hud {
      position: absolute;
      top: env(safe-area-inset-top, 16px);
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      pointer-events: none;
      backdrop-filter: blur(12px);
      background: rgba(5, 5, 12, 0.35);
      padding: 8px 18px;
      border-radius: 60px;
      border: 0.5px solid rgba(100, 120, 180, 0.2);
    }
    .title {
      font-size: 9px;
      font-weight: 380;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(180, 195, 240, 0.65);
      text-shadow: 0 0 12px rgba(80, 100, 200, 0.3);
      font-family: monospace;
    }
    .meta {
      font-size: 9px;
      font-weight: 420;
      color: rgba(170, 185, 225, 0.6);
      background: rgba(0, 0, 0, 0.4);
      padding: 5px 14px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      letter-spacing: 0.8px;
    }
    .instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 99;
      font-size: 8px;
      color: rgba(140, 150, 190, 0.38);
      background: rgba(0, 0, 0, 0.4);
      padding: 6px 14px;
      border-radius: 30px;
      pointer-events: none;
      font-weight: 400;
      letter-spacing: 0.4px;
      backdrop-filter: blur(8px);
      font-family: monospace;
      transition: all 0.4s ease;
    }
    .instructions.following {
      color: rgba(200, 180, 240, 0.65);
      background: rgba(40, 20, 60, 0.55);
    }
    .add {
      position: absolute;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(24px, env(safe-area-inset-bottom));
      width: 62px;
      height: 62px;
      border-radius: 999px;
      border: none;
      background: radial-gradient(circle at 35% 35%, rgba(80, 100, 160, 0.6), rgba(25, 20, 45, 0.95));
      backdrop-filter: blur(24px);
      color: rgba(235, 240, 255, 0.85);
      font-size: 32px;
      font-weight: 200;
      z-index: 120;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(130, 150, 220, 0.2);
      cursor: pointer;
      font-family: monospace;
    }
    .add:active {
      transform: scale(0.92);
    }

    .room-btn {
      position: absolute;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(100px, calc(env(safe-area-inset-bottom) + 76px));
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: none;
      background: radial-gradient(circle at 35% 35%, rgba(100, 120, 180, 0.5), rgba(20, 15, 35, 0.9));
      backdrop-filter: blur(20px);
      color: rgba(220, 230, 255, 0.75);
      font-size: 18px;
      font-weight: 300;
      z-index: 120;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(130, 150, 220, 0.2);
      cursor: pointer;
      font-family: monospace;
    }
    .room-btn:active {
      transform: scale(0.92);
    }

    .release-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border-radius: 999px;
      border: 1px solid rgba(180, 160, 230, 0.5);
      background: rgba(20, 15, 40, 0.75);
      backdrop-filter: blur(16px);
      color: rgba(220, 210, 255, 0.85);
      font-size: 20px;
      z-index: 150;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.3s ease;
      pointer-events: auto;
    }
    .release-btn.visible {
      display: flex;
    }
    .release-btn:active {
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(40, 30, 70, 0.9);
    }

    .modal {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(32px);
      z-index: 300;
      opacity: 0;
      transition: opacity 0.32s cubic-bezier(0.2, 0.95, 0.4, 1);
    }
    .modal.visible {
      opacity: 1;
    }
    .panel {
      width: 86%;
      max-width: 460px;
      background: rgba(12, 12, 24, 0.88);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(130, 150, 210, 0.25);
      border-radius: 56px;
      padding: 28px 24px;
      transform: scale(0.96);
      transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 30px 55px -20px rgba(0, 0, 0, 0.8);
    }
    .modal.visible .panel {
      transform: scale(1);
    }
    textarea {
      width: 100%;
      height: 260px;
      resize: none;
      background: rgba(2, 2, 8, 0.7);
      border: 1px solid rgba(100, 120, 170, 0.3);
      border-radius: 36px;
      padding: 20px 20px;
      font-size: 14px;
      line-height: 1.55;
      color: #eceeff;
      font-family: 'SF Mono', 'Menlo', monospace;
      outline: none;
      font-weight: 410;
    }
    textarea:focus {
      border-color: rgba(150, 170, 230, 0.6);
      background: rgba(6, 6, 14, 0.85);
    }
    .viewer {
      width: 100%;
      min-height: 260px;
      background: rgba(2, 2, 10, 0.55);
      border-radius: 38px;
      padding: 24px 22px;
      color: #edefff;
      font-size: 15px;
      line-height: 1.58;
      white-space: pre-wrap;
      word-break: break-word;
      font-weight: 410;
      font-family: 'SF Mono', monospace;
      border: 0.5px solid rgba(120, 140, 200, 0.2);
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }
    .actions button {
      flex: 1;
      height: 50px;
      border: none;
      border-radius: 60px;
      background: #14141ecc;
      color: #eef2ff;
      font-size: 13px;
      font-weight: 510;
      transition: all 0.12s ease;
      cursor: pointer;
      letter-spacing: 0.4px;
      backdrop-filter: blur(4px);
      font-family: monospace;
    }
    .actions button:active {
      transform: scale(0.96);
      background: #222232;
    }
    .delete {
      color: #ff9b7c !important;
      background: #2a1c1ecc !important;
    }
    .preview {
      position: absolute;
      max-width: 240px;
      background: rgba(6, 6, 16, 0.96);
      backdrop-filter: blur(36px);
      border-radius: 32px;
      padding: 14px 20px;
      border: 0.5px solid rgba(160, 180, 240, 0.3);
      font-size: 11px;
      line-height: 1.45;
      color: #dbe4ff;
      pointer-events: none;
      z-index: 220;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      font-weight: 430;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      font-family: monospace;
    }
    .preview.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.75) 90%);
      z-index: 12;
    }

    .room-input {
      width: 100%;
      height: 54px;
      background: rgba(2, 2, 8, 0.7);
      border: 1px solid rgba(100, 120, 170, 0.3);
      border-radius: 40px;
      padding: 0 22px;
      font-size: 16px;
      color: #eceeff;
      font-family: 'SF Mono', 'Menlo', monospace;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .room-input:focus {
      border-color: rgba(150, 170, 230, 0.6);
    }
    .room-label {
      color: rgba(180, 195, 240, 0.6);
      font-size: 11px;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 1px;
      font-family: monospace;
    }
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      background: #ff6b6b;
      transition: background 0.5s;
    }
    .status-dot.connected {
      background: #6bff9e;
      box-shadow: 0 0 8px #6bff9e88;
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="cosmicCanvas"></canvas>
  <div class="vignette"></div>

  <div class="hud">
    <div class="title">✦ NEBULA ARCHIVE ✦</div>
    <div class="meta" id="quantumCounter">deep space · 0</div>
  </div>

  <div class="instructions" id="instructionsBar">⟡ tap → glimpse ⟡ ⟡ double tap → follow ⟡ long press → inscribe ⟡ drag → pan</div>
  <button class="add" id="novaBtn" aria-label="new memory">✧</button>
  <button class="room-btn" id="roomBtn" aria-label="room settings">◈</button>
  <button class="release-btn" id="releaseBtn" aria-label="release star">⟳</button>
  <div class="preview" id="etherPreview"></div>

  <!-- Room Modal -->
  <div class="modal" id="roomPortal">
    <div class="panel">
      <div class="room-label"><span id="connectionStatus">◉ connecting…</span></div>
      <input class="room-input" id="roomCodeInput" placeholder="room code" maxlength="20" autocomplete="off" />
      <div class="actions">
        <button id="joinRoomBtn">enter nebula</button>
        <button id="copyRoomBtn">copy code</button>
      </div>
      <div class="actions" style="margin-top: 8px;">
        <button id="closeRoomPortal" style="flex: 1;">close</button>
      </div>
    </div>
  </div>

  <!-- View Modal -->
  <div class="modal" id="viewPortal">
    <div class="panel">
      <div class="viewer" id="memoryViewer"></div>
      <div class="actions">
        <button id="closeViewPortal">close</button>
        <button id="editFromPortal">inscribe</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editPortal">
    <div class="panel">
      <textarea id="memoryEditor" placeholder="...a fragment drifts through the void..."></textarea>
      <div class="actions">
        <button id="saveMemoryNova">engrave</button>
        <button id="cancelEditPortal">drift away</button>
        <button id="eraseMemoryNova" class="delete">obliterate</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gun@0.2020.1237/gun.js"></script>

<script>
  (function(){
    // ———————— C E L E S T I A L  M E M O R Y  U N I V E R S E ————————

    // ============ GUN P2P SETUP ============
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    let currentRoomCode = '';
    let gunNotesRef = null;
    let remoteUpdateLock = false;

    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    function joinRoom(code) {
      currentRoomCode = code;
      const roomId = 'constellation-' + code;

      if (gunNotesRef) {
        gunNotesRef.off();
      }

      const roomNode = gun.get(roomId);
      gunNotesRef = roomNode.get('notes');

      gunNotesRef.on((data) => {
        if (remoteUpdateLock) return;
        if (data && typeof data === 'object' && !Array.isArray(data)) {
          const arr = [];
          for (const key in data) {
            if (key !== '_' && data[key] && typeof data[key] === 'object') {
              arr.push(data[key]);
            }
          }
          if (arr.length > 0) {
            const remoteIds = new Set(arr.map(n => n.id));
            const localOnly = notes.filter(n => !remoteIds.has(n.id));
            notes = [...localOnly, ...arr];
            updateCosmicCount();
            remoteUpdateLock = true;
            setTimeout(() => { remoteUpdateLock = false; }, 300);
          }
        }
      });

      updateConnectionStatus();
      UI.roomCodeInput.value = code;
    }

    function updateConnectionStatus() {
      const dot = document.getElementById('connectionStatus');
      if (currentRoomCode) {
        dot.innerHTML = '<span class="status-dot connected"></span> nebula linked';
        dot.style.color = 'rgba(150, 220, 180, 0.8)';
      } else {
        dot.innerHTML = '<span class="status-dot"></span> adrift in void';
        dot.style.color = 'rgba(220, 150, 150, 0.7)';
      }
    }

    // ============ NOTES STATE ============
    let notes = [];
    let activeId = null;

    const NEBULA_CORES = [
      { name: "Somnium", x: -380, y: -210, color: [70, 85, 160], radiance: 0.08 },
      { name: "Lyra's Veil", x: 410, y: 140, color: [110, 85, 165], radiance: 0.09 },
      { name: "Fragmentum", x: 780, y: -460, color: [145, 100, 85], radiance: 0.07 },
      { name: "Echo Reach", x: -820, y: 530, color: [85, 115, 145], radiance: 0.08 },
      { name: "Nyx Garden", x: 140, y: -590, color: [75, 65, 125], radiance: 0.1 },
      { name: "Aether Drift", x: -190, y: 670, color: [120, 100, 140], radiance: 0.09 }
    ];

    // Camera with smooth inertia + follow target
    let camera = { 
      x: 0, y: 0, 
      zoom: 1.0, 
      targetZoom: 1.0,
      // Following state
      followingStarId: null,
      followTargetX: 0,
      followTargetY: 0,
      followZoom: 1.0
    };

    let canvas = document.getElementById("cosmicCanvas");
    let ctx = canvas.getContext("2d");
    let w = window.innerWidth, h = window.innerHeight;
    let dpr = window.devicePixelRatio || 1;

    let starfield = [];
    const STARFIELD_COUNT = 400;
    for(let i=0; i<STARFIELD_COUNT; i++) {
      starfield.push({
        x: Math.random() * 4000 - 2000,
        y: Math.random() * 4000 - 2000,
        size: Math.random() * 1.2 + 0.3,
        alpha: Math.random() * 0.5 + 0.2,
        twinkle: Math.random() * Math.PI * 2
      });
    }

    let nebulaParticles = [];
    for(let i=0; i<120; i++) {
      nebulaParticles.push({
        x: Math.random() * 3000 - 1500,
        y: Math.random() * 3000 - 1500,
        radius: Math.random() * 40 + 15,
        color: [Math.random() * 80 + 70, Math.random() * 60 + 60, Math.random() * 100 + 100],
        alpha: Math.random() * 0.12 + 0.03,
        driftX: Math.random() * 0.2 - 0.1,
        driftY: Math.random() * 0.2 - 0.1
      });
    }

    const UI = {
      counterSpan: document.getElementById("quantumCounter"),
      instructionsBar: document.getElementById("instructionsBar"),
      addBtn: document.getElementById("novaBtn"),
      roomBtn: document.getElementById("roomBtn"),
      releaseBtn: document.getElementById("releaseBtn"),
      roomPortal: document.getElementById("roomPortal"),
      roomCodeInput: document.getElementById("roomCodeInput"),
      joinRoomBtn: document.getElementById("joinRoomBtn"),
      copyRoomBtn: document.getElementById("copyRoomBtn"),
      closeRoomPortal: document.getElementById("closeRoomPortal"),
      viewModal: document.getElementById("viewPortal"),
      viewerSpan: document.getElementById("memoryViewer"),
      closeView: document.getElementById("closeViewPortal"),
      editViewBtn: document.getElementById("editFromPortal"),
      editModal: document.getElementById("editPortal"),
      textarea: document.getElementById("memoryEditor"),
      saveBtn: document.getElementById("saveMemoryNova"),
      cancelEdit: document.getElementById("cancelEditPortal"),
      deleteBtn: document.getElementById("eraseMemoryNova"),
      previewDiv: document.getElementById("etherPreview")
    };

    const rng = (min, max) => min + Math.random() * (max - min);
    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

    function resizeCanvas() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function persist() {
      if (gunNotesRef && currentRoomCode) {
        const cleanNotes = notes.map(n => ({
          id: n.id,
          created: n.created,
          opened: n.opened || 0,
          text: n.text,
          galaxyIdx: n.galaxyIdx,
          x: n.x,
          y: n.y,
          vx: n.vx,
          vy: n.vy,
          radius: n.radius,
          mass: n.mass,
          orbitPhase: n.orbitPhase,
          pulsePhase: n.pulsePhase,
          lastView: n.lastView || Date.now()
        }));
        gunNotesRef.put(cleanNotes);
      }
    }

    function stellarChroma(ageMs) {
      const day = 86400000, week = day*7, month = day*30;
      if(ageMs < day*3) return { core: "rgba(235, 245, 255, 0.98)", glow: "rgba(160, 200, 255, 0.35)" };
      if(ageMs < week) return { core: "rgba(200, 220, 255, 0.95)", glow: "rgba(130, 170, 240, 0.28)" };
      if(ageMs < month) return { core: "rgba(190, 175, 245, 0.92)", glow: "rgba(145, 120, 215, 0.22)" };
      return { core: "rgba(235, 195, 165, 0.9)", glow: "rgba(185, 135, 105, 0.18)" };
    }

    function computeGravitationalMass(note) {
      let lenInfluence = (note.text?.length || 12) / 34;
      let freqWeight = Math.min(3.2, (note.opened || 0) / 10);
      return clamp(lenInfluence + freqWeight, 1.2, 12.5);
    }

    function refreshMass(note) { note.mass = computeGravitationalMass(note); }

    function textSimilarity(textA, textB) {
      const wordsA = (textA || '').toLowerCase().split(/\s+/).filter(w => w.length > 2);
      const wordsB = (textB || '').toLowerCase().split(/\s+/).filter(w => w.length > 2);
      const setA = new Set(wordsA);
      const setB = new Set(wordsB);
      let intersection = 0;
      for(let w of setA) if(setB.has(w)) intersection++;
      let union = setA.size + setB.size - intersection;
      return union === 0 ? 0 : intersection / union;
    }

    function forgeMemory(text = "") {
      const cluster = NEBULA_CORES[Math.floor(Math.random() * NEBULA_CORES.length)];
      const freshNote = {
        id: Date.now() + Math.random() * 100000,
        created: Date.now(),
        opened: 0,
        text: text.trim() === "" ? "✦ an echo without name" : text,
        galaxyIdx: NEBULA_CORES.indexOf(cluster),
        x: cluster.x + rng(-125, 125),
        y: cluster.y + rng(-125, 125),
        vx: rng(-0.09, 0.09),
        vy: rng(-0.09, 0.09),
        radius: rng(2.1, 4.7),
        mass: 2.8,
        orbitPhase: rng(0, Math.PI*2),
        pulsePhase: rng(0, Math.PI*2),
        lastView: Date.now()
      };
      refreshMass(freshNote);
      notes.push(freshNote);
      persist();
      updateCosmicCount();
      return freshNote;
    }

    function updateCosmicCount() {
      const starWord = notes.length === 1 ? 'star' : 'stars';
      const roomInfo = currentRoomCode ? ' · ◈ ' + currentRoomCode : '';
      UI.counterSpan.innerText = notes.length === 0 ? 'abyss · 0' + roomInfo : `${notes.length} ✦ ${starWord}${roomInfo}`;
    }

    // ============ FOLLOW STAR LOGIC ============
    function startFollowingStar(starId) {
      const star = notes.find(n => n.id === starId);
      if (!star) return;
      
      camera.followingStarId = starId;
      camera.followTargetX = star.x;
      camera.followTargetY = star.y;
      camera.followZoom = 2.2;
      camera.targetZoom = camera.followZoom;
      
      UI.releaseBtn.classList.add('visible');
      UI.instructionsBar.classList.add('following');
      UI.instructionsBar.innerText = '⟡ following star · tap ⟳ to release';
      canvas.classList.add('following-star');
    }

    function stopFollowingStar() {
      camera.followingStarId = null;
      camera.targetZoom = 1.0;
      
      UI.releaseBtn.classList.remove('visible');
      UI.instructionsBar.classList.remove('following');
      UI.instructionsBar.innerText = '⟡ tap → glimpse ⟡ ⟡ double tap → follow ⟡ long press → inscribe ⟡ drag → pan';
      canvas.classList.remove('following-star');
    }

    function updateFollowCamera() {
      if (camera.followingStarId === null) return;
      
      const star = notes.find(n => n.id === camera.followingStarId);
      if (!star) {
        stopFollowingStar();
        return;
      }
      
      // Update target position to star's current position
      camera.followTargetX = star.x;
      camera.followTargetY = star.y;
      
      // Smoothly move camera toward star (centered on screen)
      const targetCamX = -star.x;
      const targetCamY = -star.y;
      camera.x += (targetCamX - camera.x) * 0.06;
      camera.y += (targetCamY - camera.y) * 0.06;
      
      // Maintain follow zoom
      camera.targetZoom = camera.followZoom;
    }

    // ============ SIMULATION ============
    function simulateOrbitalDrift() {
      for(let i=0; i<notes.length; i++) {
        const a = notes[i];
        a.pulsePhase = (a.pulsePhase || 0) + 0.0105;
        const home = NEBULA_CORES[a.galaxyIdx];
        if(home) {
          const dxH = home.x - a.x, dyH = home.y - a.y;
          const distH = Math.hypot(dxH, dyH);
          const attraction = 0.000022 * (1 + a.mass / 14);
          a.vx += dxH * attraction / (distH + 35);
          a.vy += dyH * attraction / (distH + 35);
        }

        for(let j=0; j<notes.length; j++) {
          if(i===j) continue;
          const b = notes[j];
          let dx = b.x - a.x, dy = b.y - a.y;
          let dist = Math.hypot(dx, dy) + 1.2;
          let pull = (b.mass * 0.000028) / dist;
          a.vx += dx * pull;
          a.vy += dy * pull;
        }

        a.orbitPhase = (a.orbitPhase || 0) + 0.0012;
        a.vx += Math.cos(a.orbitPhase) * 0.00032;
        a.vy += Math.sin(a.orbitPhase) * 0.00032;

        a.vx = (a.vx || 0) * 0.992;
        a.vy = (a.vy || 0) * 0.992;
        a.x = (a.x || 0) + a.vx;
        a.y = (a.y || 0) + a.vy;

        const boundary = 1450;
        if(Math.abs(a.x) > boundary) a.vx *= 0.95;
        if(Math.abs(a.y) > boundary) a.vy *= 0.95;
      }

      // Smooth zoom toward target
      camera.zoom += (camera.targetZoom - camera.zoom) * 0.075;
      
      // Update follow camera if following a star
      updateFollowCamera();
      
      // Drift nebula particles
      for(let p of nebulaParticles) {
        p.x += p.driftX;
        p.y += p.driftY;
        if(p.x > 1800) p.x = -1800;
        if(p.x < -1800) p.x = 1800;
        if(p.y > 1800) p.y = -1800;
        if(p.y < -1800) p.y = 1800;
      }
    }

    // ============ RENDERING ============
    function drawStarfield() {
      for(let star of starfield) {
        const twinkle = 0.5 + Math.sin(Date.now() * 0.001 * star.twinkle) * 0.3;
        ctx.fillStyle = `rgba(255, 240, 210, ${star.alpha * twinkle})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
        ctx.fill();
      }
    }

    function drawNebulaParticles() {
      for(let p of nebulaParticles) {
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
        grad.addColorStop(0, `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${p.alpha * 0.7})`);
        grad.addColorStop(1, `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fill();
      }
    }

    function drawGravitationalFields() {
      if(notes.length < 2) return;
      for(let i=0; i<notes.length; i++) {
        const a = notes[i];
        for(let j=i+1; j<notes.length; j++) {
          const b = notes[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          if(dist < 280 && dist > 25) {
            const forceStrength = (a.mass * b.mass) / (dist * dist);
            const intensity = Math.min(0.55, forceStrength / 8);
            const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
            grad.addColorStop(0, `rgba(100, 180, 240, ${intensity * 0.5})`);
            grad.addColorStop(0.5, `rgba(180, 130, 220, ${intensity * 0.7})`);
            grad.addColorStop(1, `rgba(100, 180, 240, ${intensity * 0.5})`);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = grad;
            ctx.lineWidth = Math.max(0.5, Math.min(2.0, forceStrength / 3.5));
            ctx.stroke();
          }
        }
      }
    }
